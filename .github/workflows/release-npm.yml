name: Release npm packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag'
        required: true
        default: beta

permissions:
  contents: read

concurrency:
  group: npm-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NPM_DIST_TAG: ${{ inputs.tag || 'beta' }}

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag and package versions
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs'
          import { readdirSync } from 'node:fs'
          const tag = process.env.GITHUB_REF_NAME
          const expected = tag?.replace(/^v/, '')
          if (!expected) throw new Error('无法读取 Git tag')
          for (const dir of readdirSync('packages', { withFileTypes: true })) {
            if (!dir.isDirectory()) continue
            const path = `packages/${dir.name}/package.json`
            try {
              const pkg = JSON.parse(readFileSync(path, 'utf8'))
              if (pkg.private) continue
              if (pkg.version !== expected) throw new Error(`${pkg.name} 版本 ${pkg.version} 与 tag ${expected} 不一致`)
            } catch (error) {
              if (error.code !== 'ENOENT') throw error
            }
          }
          NODE

      - name: Run release checks
        run: pnpm release:check

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm --filter @luma/icons publish --no-git-checks --tag "$NPM_DIST_TAG"
          pnpm --filter @luma/icons-vue publish --no-git-checks --tag "$NPM_DIST_TAG"
          pnpm --filter @luma/core publish --no-git-checks --tag "$NPM_DIST_TAG"
          pnpm --filter @luma/charts publish --no-git-checks --tag "$NPM_DIST_TAG"
          pnpm --filter @luma/datav publish --no-git-checks --tag "$NPM_DIST_TAG"
          pnpm --filter @luma/cockpit publish --no-git-checks --tag "$NPM_DIST_TAG"
          pnpm --filter @luma/vben-compat publish --no-git-checks --tag "$NPM_DIST_TAG"
          pnpm --filter @luma/vite publish --no-git-checks --tag "$NPM_DIST_TAG"
          pnpm --filter create-luma-admin publish --no-git-checks --tag "$NPM_DIST_TAG"
